version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - chroma_data:/app/chroma_db
    environment:
      - PYTHONUNBUFFERED=1
      # Раскомментируйте и добавьте ваш API ключ для использования OpenAI
      # - OPENAI_API_KEY=your_api_key_here
    restart: unless-stopped

volumes:
  chroma_data:
